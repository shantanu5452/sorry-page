<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    position:relative;
    z-index:2;
}

h1{
    font-size:2.2rem;
    color:#ff4d6d;
}

p{
    margin-top:15px;
    color:#555;
    line-height:1.6;
}

.heart{
    font-size:4rem;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.buttons{
    margin-top:25px;
}

button{
    border:none;
    padding:12px 24px;
    margin:8px;
    border-radius:30px;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.no{
    background:#ddd;
}

.yes:hover{
    transform:scale(1.05);
}

.message{
    margin-top:20px;
    font-weight:bold;
    color:#ff4d6d;
}

.floating-heart{
    position:absolute;
    color:white;
    font-size:24px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="heart">❤️</div>

    <h1 id="title">I'm Sorry</h1>

    <p id="customMessage">
        I know I made a mistake and I genuinely regret it.
        You mean a lot to me and I hope you'll forgive me.
    </p>

    <div class="buttons">
        <button class="yes" onclick="forgive()">Forgive Me 🥺</button>
        <button class="no" id="noBtn">No 😒</button>
    </div>

    <div class="message" id="response"></div>

</div>

<script>

// Read URL parameters
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const from = params.get("from");
const msg = params.get("msg");

if(name){
    document.getElementById("title").innerHTML =
        `Sorry ${name} ❤️`;
}

if(msg){
    document.getElementById("customMessage").innerText = msg;
}

function forgive(){
    document.getElementById("response").innerHTML =
        `Thank you ${name || ""}! ❤️`;
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {

    const x = Math.random() * 300 - 150;
    const y = Math.random() * 150 - 75;

    noBtn.style.transform =
        `translate(${x}px, ${y}px)`;
});

// Floating hearts
function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("floating-heart");
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random()*100 + "vw";

    heart.style.animationDuration =
        (Math.random()*4+4) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,400);

if(from){
    document.getElementById("customMessage")
    .innerHTML += `<br><br>— ${from}`;
}

</script>

</body>
</html>
