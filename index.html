<script>

const bgMusic = document.getElementById("bgMusic");
const yesMusic = document.getElementById("yesMusic");
const noMusic = document.getElementById("noMusic");

function stopAllMusic() {

    bgMusic.pause();
    yesMusic.pause();
    noMusic.pause();

    bgMusic.currentTime = 0;
    yesMusic.currentTime = 0;
    noMusic.currentTime = 0;
}

// Main song when site opens
window.addEventListener("load", () => {

    bgMusic.volume = 0.7;

    bgMusic.play().catch(() => {
        console.log("Autoplay blocked");
    });

});

// If browser blocks autoplay
document.addEventListener("click", () => {

    if(bgMusic.paused){
        bgMusic.play();
    }

}, { once:true });

document.addEventListener("touchstart", () => {

    if(bgMusic.paused){
        bgMusic.play();
    }

}, { once:true });

function yesClicked(){

    stopAllMusic();

    yesMusic.play();

    document.getElementById("reply").innerHTML =
    "Thank you ❤️ You made my day.";

}

function noClicked(){

    stopAllMusic();

    noMusic.play();

    document.getElementById("reply").innerHTML =
    "Please think once more 🥺❤️";

    const btn = document.getElementById("noBtn");

    const x = Math.random() * 300 - 150;
    const y = Math.random() * 200 - 100;

    btn.style.transform =
        `translate(${x}px, ${y}px)`;
}

function createHeart(){

    const heart = document.createElement("div");

    heart.className = "floating-heart";
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

setInterval(createHeart, 500);

</script>
